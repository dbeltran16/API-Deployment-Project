
# This workflow triggers on pushes and pull requests to the main branch
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
# This ensures that pull requests targeting the main branch will trigger the workflow

      jobs:
      build:
  runs-on: ubuntu-latest

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
# Test job will run after the build job is completed
test:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        pytest

          deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
          https://api.render.com/v1/services/${{ secrets.SERVICE_ID }}/deploys \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Accept: application/json"