
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint code
        run: |
          flake8 app flask_app.py tests --max-line-length=100

      - name: Build validation
        run: |
          python -m compileall app flask_app.py

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Smoke test app startup
        run: |
          python flask_app.py &
          APP_PID=$!
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "App health endpoint is reachable"
              kill "$APP_PID"
              wait "$APP_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "App did not become healthy in time"
          kill "$APP_PID"
          wait "$APP_PID" 2>/dev/null || true
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json"

      - name: Verify deployed app health
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Missing HEALTHCHECK_URL secret"
            exit 1
          fi

          for i in {1..30}; do
            if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
              echo "Deployed application is healthy"
              exit 0
            fi
            echo "Waiting for deploy healthcheck..."
            sleep 10
          done

          echo "Deployed application failed healthcheck"
          exit 1
